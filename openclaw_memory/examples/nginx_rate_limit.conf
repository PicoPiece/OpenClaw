# Optional outbound rate limiting for LLM API calls via nginx reverse proxy.
# Place upstream of your LLM calls if you want network-layer limiting.

limit_req_zone $binary_remote_addr zone=llm_cloud:10m rate=30r/m;

upstream gemini_api {
    server generativelanguage.googleapis.com:443;
}

server {
    listen 8443 ssl;
    server_name llm-proxy.local;

    # TLS certs (self-signed or Let's Encrypt)
    ssl_certificate     /etc/nginx/certs/proxy.crt;
    ssl_certificate_key /etc/nginx/certs/proxy.key;

    location /v1beta/ {
        limit_req zone=llm_cloud burst=5 nodelay;
        limit_req_status 429;

        proxy_pass https://gemini_api;
        proxy_set_header Host generativelanguage.googleapis.com;
        proxy_ssl_server_name on;

        # Log rate-limited requests
        error_log /var/log/nginx/llm_ratelimit.log warn;
    }
}
