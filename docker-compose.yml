services:
  openclaw:
    build: .
    image: openclaw-custom:latest
    container_name: openclaw
    restart: unless-stopped

    network_mode: host

    user: "1000:1000"
    read_only: true

    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    deploy:
      resources:
        limits:
          cpus: "8.0"
          memory: 8G

    shm_size: "256mb"

    environment:
      - PLAYWRIGHT_BROWSERS_PATH=/home/node/.openclaw/browsers
      - CHROME_CRASHPAD_HANDLER_TRAMPOLINE_DISABLE=1

    env_file:
      - .env

    volumes:
      - ./data:/home/node/.openclaw

    tmpfs:
      - /tmp:size=512M
      - /home/node/.cache:size=128M
      - /var/cache/fontconfig:size=16M

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:18789/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
